<div class="search-settings-controls">
  <div class="filter-field">
    <label for="artist-select" class="filter-label">
      <i class="fa fa-paint-brush" aria-hidden="true"></i>
      <span class="label-text">Artist</span>
    </label>
    <select id="artist-select" class="artist-select" (change)="onArtistChange($event)" [value]="selectedArtist">
      <option value="ANY">ANY</option>
      @for (artist of guestArtists; track artist) {
        <option value="{{ artist }}">{{ artist }}</option>
      }
    </select>
  </div>
</div>
