<section class="section" [attr.id]="'section-' + section.key" [attr.data-section]="section.key">
  <div class="section-head">
    <h3 class="section-label">{{ section.label }}</h3>
    <span class="section-count">{{ cards.length }} cards</span>
  </div>

  <div class="card-grid">
    @for (card of cards; track card.src) {
      <app-gallery-card [card]="card" (cardSelected)="cardSelected.emit($event)" />
    }
  </div>
</section>
