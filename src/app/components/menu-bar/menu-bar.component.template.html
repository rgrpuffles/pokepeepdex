<header class="chrome">
  <button
    type="button"
    class="brand-mark"
    [class.brand-mark--caret]="!isAtTop"
    [disabled]="isAtTop"
    [attr.aria-label]="isAtTop ? 'Go to top' : 'Back to top'"
    (click)="scrollToTop()"
  >
    <span class="brand-mark__state brand-mark__state--pp" [attr.aria-hidden]="!isAtTop">
      <span class="brand-letter brand-letter--peach">P</span>
      <span class="brand-letter brand-letter--gold">P</span>
    </span>
    <span class="brand-mark__state brand-mark__state--caret" [attr.aria-hidden]="isAtTop">
      <i class="brand-caret fa-solid fa-caret-up" aria-hidden="true"></i>
    </span>
  </button>

  <nav class="set-nav" aria-label="Card sets">
    @for (set of sets; track set.id) {
      <a
        [routerLink]="['/', set.slug]"
        queryParamsHandling="preserve"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        [style.--link-accent]="set.accent"
        [style.--link-glow]="set.glow"
      >
        <span>{{ set.code }}</span>
      </a>
    }
  </nav>
</header>
